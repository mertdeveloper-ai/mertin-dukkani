<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mert'in Akıllı Dükkanı V3</title>
    <style>
        :root { --bg: #1a1a1a; --kart: #2d2d2d; --yazi: white; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--yazi); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .kart { background: var(--kart); padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; width: 400px; }
        input { display: block; width: 100%; margin: 15px 0; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; box-sizing: border-box; }
        .urun-kart { border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-top: 15px; }
        img { width: 120px; border-radius: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; margin-top: 10px; width: 100%; }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }
        .temizle-btn { background: #dc3545; margin-top: 5px; }
        /* Bu kısım aydınlık modun renklerini belirler */
body.light-mode {
    --bg: #f8f9fa;
    --kart: #ffffff;
    --yazi: #212529;
}

/* Aydınlık modda inputların görünümü */
body.light-mode input {
    background: #fff;
    color: #212529;
    border: 1px solid #ced4da;
}

/* Aydınlık modda ürün kartlarının çerçevesi */
body.light-mode .urun-kart {
    border: 1px solid #dee2e6;
    background: #f1f3f5;
}
    </style>
</head>
<body>

    <div class="kart">
        <button onclick="moduDegistir()" style="background: #6c757d; margin-bottom: 20px;">☀️/🌙 Modu Değiştir</button>
        <h2>Mert'in Dükkanı</h2>
        <input type="text" id="kullaniciAdi" placeholder="Adınızı yazın...">
        <input type="text" id="kuponKodu" placeholder="İndirim kuponu girin (Örn: MERT20)">
<button onclick="kuponuUygula()" style="background: #28a745; margin-bottom: 15px;">Kuponu Onayla</button>
        
        <h3 id="toplamTutarAlani" style="color: #ffd700; margin: 10px 0;">Toplam: 0 TL</h3>
        <button class="temizle-btn" onclick="sepetiSifirla()">🗑️ Sepeti Temizle</button>
        
        <div id="mesajAlani" style="margin: 15px 0; font-weight: bold; min-height: 24px; color: #28a745;"></div>

        <div class="urun-kart">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200" alt="Saat">
            <h4>Premium Saat (500 TL)</h4>
            <p id="saatStok">Kalan: 3 Adet</p>
            <button id="saatButon" onclick="sepeteUrunEkle(500, 'Saat')">Ekle</button>
        </div>

        <div class="urun-kart">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200" alt="Kulaklık">
            <h4>Oyun Kulaklığı (750 TL)</h4>
            <p id="kulaklikStok">Kalan: 2 Adet</p>
            <button id="kulaklikButon" onclick="sepeteUrunEkle(750, 'Kulaklık')">Ekle</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
